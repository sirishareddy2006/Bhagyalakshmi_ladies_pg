<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhagyalakshmi Women's PG</title>
<meta name="description" content="Safe and affordable women's PG in Attibele for students and working professionals. Food, WiFi, security and comfortable rooms available.">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#f4f4f4;
  color:#333;
  scroll-behavior:smooth;
}

/* NAVBAR */
nav{
  background:#222;
  color:white;
  padding:15px 30px;
  position:sticky;
  top:0;
  z-index:1000;
}

/* NEW MOBILE MENU BUTTON */
.menu-toggle{
display:none;
background:none;
border:none;
color:white;
font-size:28px;
cursor:pointer;
}

nav ul{
  list-style:none;
  display:flex;
  gap:25px;
  margin:0;
  padding:0;
  justify-content:center;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:500;
}

/* HERO */
.hero{
  height:90vh;
  position:relative;
  overflow:hidden;
}
.hero img{
  width:100%;
  height:90vh;
  object-fit:cover;
  position:absolute;
  opacity:0;
  animation:slider 15s infinite;
}
.hero img:nth-child(1){animation-delay:0s;}
.hero img:nth-child(2){animation-delay:5s;}
.hero img:nth-child(3){animation-delay:10s;}
@keyframes slider{
  0%{opacity:0}
  5%{opacity:1}
  30%{opacity:1}
  35%{opacity:0}
  100%{opacity:0}
}

.hero-overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero-text{
  color:white;
}

.hero-text h1{
  font-size:45px;
  margin-bottom:10px;
}

/* BUTTON */
button{
  background:#ff7e5f;
  border:none;
  padding:10px 20px;
  color:white;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#ff5722;
}

/* SECTION */
section{
  padding:60px;
  max-width:1100px;
  margin:auto;
  background:white;
  margin-top:25px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  margin-bottom:25px;
}

/* STATS */
.stats{
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
}

.stat{
  background:#fafafa;
  padding:30px;
  border-radius:10px;
  text-align:center;
  width:220px;
}

.stat h1{
  color:#ff7e5f;
  font-size:40px;
}

/* ROOM TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  padding:12px;
  border:1px solid #ddd;
  text-align:center;
}

th{
  background:#ff7e5f;
  color:white;
}

tr:nth-child(even){
  background:#f9f9f9;
}

/* FACILITIES */
.facilities{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.facility{
  background:linear-gradient(135deg,#ff7e5f,#feb47b);
  color:white;
  padding:20px;
  border-radius:10px;
  width:200px;
  text-align:center;
  transition:0.3s;
}

.facility:hover{
  transform:translateY(-5px);
}

/* GALLERY */
.slider-container{
  position:relative;
  width:100%;
  max-width:1100px;  
  height:500px;      
  margin:auto;
  overflow:hidden;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  background:#000;
}

.slider-container img{
  width:100%;
  height:100%;
  object-fit:contain;  
  position:absolute;
  opacity:0;
  transition:opacity 1s ease-in-out, transform 0.5s ease;
}

.slider-container img.active{
  opacity:1;
  transform:scale(1.02);
  z-index:1;
}

/* MOBILE FIX */
@media(max-width:700px){

.menu-toggle{
display:block;
}

nav ul{
display:none;
flex-direction:column;
align-items:center;
background:#222;
position:absolute;
top:60px;
left:0;
width:100%;
}

nav ul.show{
display:flex;
}

section{
padding:30px;
}

.hero-text h1{
font-size:28px;
}

}

/* REST OF YOUR CSS REMAINS SAME */
</style>
</head>

<body>

<nav>

<!-- ADDED MOBILE BUTTON -->
<button class="menu-toggle" onclick="toggleMenu()">☰</button>

<ul id="navMenu">
<li><a href="#about">About</a></li>
<li><a href="#rooms">Rooms</a></li>
<li><a href="#facilities">Facilities</a></li>
<li><a href="#gallery">Photos</a></li>
<li><a href="#video">Video</a></li>
<li><a href="#rules">Rules</a></li>
<li><a href="#reviews">Reviews</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

</nav>

<!-- EVERYTHING ELSE SAME (UNCHANGED) -->

<!-- your full remaining HTML stays exactly same -->

<script>

/* MOBILE MENU SCRIPT */
function toggleMenu(){
document.getElementById("navMenu").classList.toggle("show");
}

/* YOUR ORIGINAL JAVASCRIPT BELOW (UNCHANGED) */

const counters=document.querySelectorAll('.counter');
counters.forEach(counter=>{
  const target=+counter.getAttribute('data-target');
  let count=0;
  function update(){
    if(count<=target){
      counter.innerText=count+"+";
      count++;
      setTimeout(update,40);
    }
  }
  update();
});

let rating=0;
function rate(n){
  rating=n;
  document.querySelectorAll(".stars span").forEach((s,i)=>{
    s.classList.toggle("active",i<n);
  });
}

window.onload=function(){
  let reviews=JSON.parse(localStorage.getItem("pgReviews"));
  if(!reviews){
    reviews=[
      {name:"Anjali",rating:5,text:"Very safe and comfortable PG."},
      {name:"Priya",rating:4,text:"Affordable price and good facilities."}
    ];
    localStorage.setItem("pgReviews",JSON.stringify(reviews));
  }
  reviews.forEach(addReviewToPage);

  const slides=document.querySelectorAll(".slider-container img");
  let current=0;
  setInterval(()=>{
    slides[current].classList.remove("active");
    current=(current+1)%slides.length;
    slides[current].classList.add("active");
  },3000);
}

function submitReview(){
  const name=document.getElementById("name").value;
  const text=document.getElementById("reviewText").value;
  if(name==="" || text==="" || rating===0){
    alert("Please fill name, rating and review");
    return;
  }
  const review={name:name,rating:rating,text:text};
  let reviews=JSON.parse(localStorage.getItem("pgReviews")) || [];
  reviews.push(review);
  localStorage.setItem("pgReviews",JSON.stringify(reviews));
  addReviewToPage(review);
  document.getElementById("name").value="";
  document.getElementById("reviewText").value="";
  rating=0;
}

function addReviewToPage(r){
  const div=document.createElement("div");
  div.className="review";
  div.innerHTML="<b>"+r.name+"</b><br>"+("⭐".repeat(r.rating))+"<br>"+r.text;
  document.getElementById("reviewList").appendChild(div);
}

</script>

</body>
</html>
